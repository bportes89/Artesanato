name: Health Monitoring

on:
  workflow_dispatch:

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Check backend
        if: ${{ secrets.BACKEND_HEALTHCHECK_URL != '' }}
        run: |
          curl -fsSL --retry 3 --retry-all-errors --max-time 120 "${{ secrets.BACKEND_HEALTHCHECK_URL }}"
      - name: Check frontend
        if: ${{ secrets.FRONTEND_HEALTHCHECK_URL != '' }}
        run: |
          curl -fsSL --retry 3 --retry-all-errors --max-time 120 "${{ secrets.FRONTEND_HEALTHCHECK_URL }}"
